name: Deploy to Railway

# Deploys to Railway on every push to any branch via the Railway CLI.
#
# SETUP (one time):
#   1. In Railway: project → service → Settings → Tokens, or Account → Tokens,
#      create a token. A PROJECT token (scoped to one project + environment) is
#      the safest choice for CI.
#   2. In GitHub: Settings → Secrets and variables → Actions → New repository
#      secret named RAILWAY_TOKEN with that value.
#   3. (Optional) If the project has more than one service, set a repository
#      VARIABLE named RAILWAY_SERVICE to the service name so the right one is
#      targeted. With a single service this can be left unset.
#
# NOTE: every-branch deploys go to the SAME Railway service/environment that the
# token is scoped to. Keep production isolation in mind — a push to any branch
# will redeploy whatever environment this token points at.

on:
  push:
    branches: ['**']

# Cancel an in-flight deploy for a branch if a newer push arrives.
concurrency:
  group: railway-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm i -g @railway/cli

      - name: Deploy
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_SERVICE: ${{ vars.RAILWAY_SERVICE }}
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "RAILWAY_TOKEN secret is not set — skipping deploy." >&2
            exit 1
          fi
          if [ -n "$RAILWAY_SERVICE" ]; then
            railway up --service "$RAILWAY_SERVICE" --ci
          else
            railway up --ci
          fi
